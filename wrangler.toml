# Cloudflare Pages 配置（可选，用于 wrangler CLI 直传部署）
#
# 主推方式：在 Cloudflare Dashboard 连接 GitHub 仓库自动部署（见 DEPLOY.md）。
# 本文件用于"不连 Git、命令行直传 dist/"的备选方式：
#   npx wrangler pages deploy dist --project-name=solar-system
#
# 首次使用需先登录：npx wrangler login

name = "solar-system"
pages_build_output_dir = "dist"
compatibility_date = "2025-07-01"

# 纯静态站点，无需任何 Functions / 环境变量。
# 构建命令在 Dashboard 中设置为：npm run build
# 构建输出目录设置为：dist
