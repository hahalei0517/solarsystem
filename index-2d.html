<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>太阳系互动模型 · Solar System</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #000; color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }
  #stage { position: fixed; inset: 0; display: block; cursor: grab; touch-action: none; }
  #stage:active { cursor: grabbing; }

  .panel {
    position: fixed;
    background: rgba(13, 17, 23, 0.72);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.55);
  }
  #top-bar {
    top: 14px; left: 50%; transform: translateX(-50%);
    padding: 9px 12px; display: flex; align-items: center; gap: 10px;
    z-index: 10; flex-wrap: wrap; max-width: calc(100vw - 24px);
  }
  .group { display: flex; align-items: center; gap: 6px; }
  .group .label { font-size: 11px; color: #8b949e; letter-spacing: .5px; }
  .seg {
    display: inline-flex; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 3px;
  }
  .seg button {
    background: transparent; color: #c9d1d9; border: 0; cursor: pointer;
    padding: 5px 11px; border-radius: 7px; font-size: 12.5px; transition: all .18s;
  }
  .seg button:hover { color: #fff; }
  .seg button.active {
    background: linear-gradient(180deg, #2f81f7, #1f6feb); color: #fff;
    box-shadow: 0 2px 10px rgba(47,129,247,0.45);
  }
  .icon-btn {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    color: #c9d1d9; cursor: pointer; padding: 6px 10px;
    border-radius: 9px; font-size: 12.5px; transition: all .18s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.10); color: #fff; }
  .icon-btn.on { background: rgba(47,129,247,0.25); border-color: rgba(47,129,247,0.45); color: #fff; }
  .divider { width: 1px; height: 22px; background: rgba(255,255,255,0.10); }

  #planet-list {
    top: 76px; left: 14px; width: 210px; padding: 10px; z-index: 10;
    max-height: calc(100vh - 200px); overflow-y: auto;
  }
  #planet-list h3 {
    font-size: 11px; color: #8b949e; letter-spacing: 1.4px;
    text-transform: uppercase; padding: 4px 6px 8px;
  }
  .planet-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 8px; border-radius: 8px; cursor: pointer; transition: background .15s;
  }
  .planet-row:hover { background: rgba(255,255,255,0.06); }
  .planet-row.focused { background: rgba(47,129,247,0.18); }
  .swatch { width: 14px; height: 14px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
  .planet-row .name { flex: 1; font-size: 13px; }
  .planet-row input[type=checkbox] {
    appearance: none; width: 14px; height: 14px; border-radius: 4px;
    border: 1.5px solid rgba(255,255,255,0.3); background: transparent;
    cursor: pointer; position: relative;
  }
  .planet-row input[type=checkbox]:checked { background: #2f81f7; border-color: #2f81f7; }
  .planet-row input[type=checkbox]:checked::after {
    content: ""; position: absolute; left: 3px; top: 0px;
    width: 4px; height: 8px; border: solid #fff;
    border-width: 0 2px 2px 0; transform: rotate(45deg);
  }

  #info {
    top: 76px; right: 14px; width: 290px; padding: 16px; z-index: 10;
    transition: opacity .25s, transform .25s;
  }
  #info.hidden { opacity: 0; transform: translateX(20px); pointer-events: none; }
  #info .title { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  #info .title h2 { font-size: 17px; font-weight: 600; }
  #info .desc { font-size: 12.5px; color: #b1bac4; line-height: 1.6; margin-bottom: 10px; }
  #info dl { display: grid; grid-template-columns: auto 1fr; gap: 5px 12px; font-size: 12.5px; }
  #info dt { color: #8b949e; }
  #info dd { color: #e6edf3; text-align: right; }
  #info .chart-wrap {
    margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.08);
  }
  #info .chart-title { font-size: 11px; color: #8b949e; letter-spacing: 1.3px; text-transform: uppercase; margin-bottom: 6px; }
  #period-chart { width: 100%; height: 56px; display: block; }
  #info .moons {
    margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.08);
  }
  #info .moons h4 { font-size: 11px; color: #8b949e; letter-spacing: 1.3px; margin-bottom: 8px; text-transform: uppercase; }
  .moon-pill {
    display: inline-block; padding: 3px 9px; margin: 0 4px 4px 0;
    font-size: 11.5px; border-radius: 999px;
    background: rgba(255,255,255,0.06); color: #c9d1d9;
    border: 1px solid rgba(255,255,255,0.08);
  }

  #timeline {
    bottom: 14px; left: 50%; transform: translateX(-50%);
    padding: 10px 16px; z-index: 10; display: flex; align-items: center; gap: 14px;
    width: min(720px, calc(100vw - 28px));
  }
  #timeline .date { font-size: 12.5px; color: #e6edf3; min-width: 92px; }
  #timeline .scrubber {
    flex: 1; appearance: none; height: 4px; border-radius: 2px;
    background: linear-gradient(to right, #2f81f7 0%, #2f81f7 var(--p,50%), rgba(255,255,255,0.12) var(--p,50%));
    outline: none;
  }
  #timeline .scrubber::-webkit-slider-thumb {
    appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: #fff; box-shadow: 0 0 0 3px rgba(47,129,247,0.5); cursor: pointer;
  }
  #timeline .stat { font-size: 11.5px; color: #8b949e; }
  #timeline .stat b { color: #e6edf3; font-weight: 500; }

  #tip {
    position: fixed; pointer-events: none;
    padding: 5px 10px; font-size: 12px;
    background: rgba(13,17,23,0.92); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; opacity: 0; transition: opacity .15s; z-index: 20;
  }

  /* mobile */
  @media (max-width: 720px) {
    #top-bar { gap: 6px; padding: 8px; font-size: 12px; }
    .seg button, .icon-btn { padding: 5px 8px; font-size: 11.5px; }
    #planet-list { width: 160px; top: 110px; }
    #info { width: calc(100vw - 28px); right: 14px; left: 14px; top: auto; bottom: 90px;
            max-height: 40vh; overflow-y: auto; }
    #timeline { width: calc(100vw - 28px); }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<div id="top-bar" class="panel">
  <div class="group">
    <span class="label">速度</span>
    <div class="seg" id="speed-seg">
      <button data-speed="day" class="active">日</button>
      <button data-speed="month">月</button>
      <button data-speed="year">年</button>
    </div>
  </div>
  <div class="divider"></div>
  <div class="group">
    <span class="label">尺度</span>
    <div class="seg" id="scale-seg">
      <button data-scale="schematic" class="active">示意</button>
      <button data-scale="real">真实</button>
    </div>
  </div>
  <div class="divider"></div>
  <div class="group">
    <button class="icon-btn" id="play-btn">⏸</button>
    <button class="icon-btn" id="reset-btn">↺ 复位</button>
    <button class="icon-btn on" id="tilt-btn">倾斜 25°</button>

  <div class="divider"></div>

    <button class="icon-btn on" id="belts-btn">小行星带</button>
    <button class="icon-btn" id="sound-btn">🔇</button>

</div>

<div id="planet-list" class="panel">
  <h3>行星</h3>
  <div id="planet-rows"></div>
</div>

<div id="info" class="panel hidden">

  </div>
  <p class="desc" id="info-desc"></p>

</div>

<div id="timeline" class="panel">
  <div class="date" id="sim-date">2000-01-01</div>
  <input type="range" class="scrubber" id="scrubber" min="-18250" max="36500" value="0" step="1" />
  <div class="stat">速度 <b id="speed-info">1 天/秒</b></div>
</div>

<div id="tip"></div>

<script>
/* =========================================================
 *  Solar System v2 — Interactive Canvas Model
 *
 *  Improvements vs v1:
 *    1. Elliptical orbits via Kepler's equation + inclination
 *    2. Schematic vs Real (AU) scale toggle
 *    3. Time scrubber spanning J2000 ± 50 years
 *    4. Procedural banding for gas giants + rotation
 *    5. Motion trails behind each planet
 *    6. Asteroid belt + Kuiper belt
 *    7. Period comparison chart inside info card
 *    8. Sonification — note plays each time a planet completes a revolution
 *    +  Tilted 3D-ish view, touch (pinch + pan), mobile layout

const SUN = {

};

// orbit (schematic px), realAU (true), period (Earth days),
// e (eccentricity), inc (deg), peri (deg, longitude of periapsis),
// rotPeriod (Earth days for self-rotation, sign = direction)
const PLANETS = [

    moons: []
  },

    desc: "目前已知唯一孕育生命的行星，表面 71% 被液态水覆盖。",
    stats: { "公转周期": "365.25 天", "自转周期": "23.93 小时", "直径": "12,742 km", "距日": "1.00 AU", "偏心率": "0.017" },
    moons: [{ name: "月球", color: "#D0D0D0", radius: 1.7, orbit: 13, period: 27.3 }]
  },

    orbit: 185, realAU: 1.52, period: 686.97,
    e: 0.094, inc: 1.85, peri: 336, rotPeriod: 1.026,
    desc: "红色星球，存在最高的奥林帕斯山，曾有液态水流动痕迹。",
    stats: { "公转周期": "687 天", "自转周期": "24.6 小时", "直径": "6,779 km", "距日": "1.52 AU", "偏心率": "0.094" },
    moons: [
      { name: "火卫一 Phobos", color: "#9C8674", radius: 1.0, orbit: 10, period: 0.32 },
      { name: "火卫二 Deimos", color: "#A89888", radius: 0.8, orbit: 15, period: 1.26 }
    ]
  },
  {
    name: "木星", en: "Jupiter", color: "#E0AE6F", radius: 16,
    orbit: 260, realAU: 5.20, period: 4332.59,
    e: 0.049, inc: 1.3, peri: 14, rotPeriod: 0.414,
    desc: "太阳系最大的行星，气态巨行星，著名的大红斑已持续数百年。",
    stats: { "公转周期": "11.86 年", "自转周期": "9.93 小时", "直径": "139,820 km", "距日": "5.20 AU", "偏心率": "0.049" },
    moons: [
      { name: "木卫一 Io",       color: "#F5D572", radius: 1.6, orbit: 24, period: 1.77 },
      { name: "木卫二 Europa",   color: "#C2B49A", radius: 1.5, orbit: 30, period: 3.55 },
      { name: "木卫三 Ganymede", color: "#9C8C72", radius: 2.0, orbit: 38, period: 7.15 },
      { name: "木卫四 Callisto", color: "#6F6453", radius: 1.9, orbit: 46, period: 16.69 }
    ],

  },
  {

    orbit: 340, realAU: 9.54, period: 10759.22,

    desc: "拥有最壮观的行星环系统，主要由冰和岩石组成。",
    stats: { "公转周期": "29.46 年", "自转周期": "10.7 小时", "直径": "116,460 km", "距日": "9.54 AU", "偏心率": "0.057" },
    moons: [
      { name: "土卫六 Titan",     color: "#C9A06A", radius: 2.0, orbit: 26, period: 15.95 },
      { name: "土卫五 Rhea",      color: "#B5B0A8", radius: 1.3, orbit: 34, period: 4.52 },
      { name: "土卫二 Enceladus", color: "#E8E8F0", radius: 1.1, orbit: 42, period: 1.37 }
    ],
    hasRing: true,

  },
  {

    desc: "侧躺自转的冰巨星，大气富含甲烷使其呈青蓝色。",
    stats: { "公转周期": "84 年", "自转周期": "17.2 小时 (倾斜97°)", "直径": "50,724 km", "距日": "19.2 AU", "偏心率": "0.046" },
    moons: [
      { name: "天卫五 Miranda",  color: "#A8B5BC", radius: 1.0, orbit: 18, period: 1.41 },
      { name: "天卫三 Titania",  color: "#9CA8AE", radius: 1.4, orbit: 26, period: 8.71 },
      { name: "天卫四 Oberon",   color: "#8F9BA0", radius: 1.3, orbit: 32, period: 13.46 }
    ]
  },
  {
    name: "海王星", en: "Neptune", color: "#3F6CD4", radius: 8.7,
    orbit: 470, realAU: 30.1, period: 60182,
    e: 0.011, inc: 1.77, peri: 48, rotPeriod: 0.671,
    desc: "最远的行星，风速可达 2,100 km/h，是太阳系风暴最剧烈的世界。",
    stats: { "公转周期": "165 年", "自转周期": "16.1 小时", "直径": "49,244 km", "距日": "30.1 AU", "偏心率": "0.011" },
    moons: [{ name: "海卫一 Triton", color: "#C0BCD0", radius: 1.5, orbit: 20, period: 5.88 }]
  }
];

const SPEED_MODES = {
  day:   { value: 1,    label: "1 天/秒" },
  month: { value: 30,   label: "30 天/秒 (≈月)" },
  year:  { value: 365,  label: "365 天/秒 (≈年)" }
};

// Pentatonic notes (Hz) — one per planet for sonification
const NOTES = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];

// ---------- Canvas ----------
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");
let DPR = window.devicePixelRatio || 1;
let W = 0, H = 0;
function resize() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  buildStars();
}
window.addEventListener("resize", resize);

// ---------- State ----------
const state = {
  simDays: 0,             // days since J2000 epoch (2000-01-01)
  speedMode: "day",
  scaleMode: "schematic", // "schematic" | "real"
  playing: true,
  showOrbits: true,
  showLabels: true,
  showTrails: true,
  showBelts: true,
  tilt: 25 * Math.PI/180, // X-axis tilt in radians
  soundOn: false,
  focusIndex: -1, soloIndex: -1,
  visible: new Set([0,1,2,3,4,5,6,7]),
  camX: 0, camY: 0, zoom: 1,
  dragging: false, lastX: 0, lastY: 0,
  pinchD: 0,
  cx: 0, cy: 0,
  positions: [],          // hit-test cache
  trails: PLANETS.map(()=>[]),
  lastRev: PLANETS.map(()=>0), // last completed revolution count (for sonification)
};

const AU_PX = 60;         // px per AU in "real" scale mode
const J2000 = new Date(Date.UTC(2000,0,1,12,0,0));

// ---------- Stars ----------
let stars = [];
function buildStars() {
  const n = Math.floor((W*H) / 2200);
  stars = new Array(n).fill(0).map(() => ({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*1.2 + 0.2,
    a: Math.random()*0.6 + 0.2,
    tw: Math.random()*0.02 + 0.005
  }));
}

// ---------- Kepler math ----------
function solveKepler(M, e) {
  let E = M + e*Math.sin(M);  // good initial guess
  for (let i = 0; i < 6; i++) {
    const dE = (E - e*Math.sin(E) - M) / (1 - e*Math.cos(E));
    E -= dE;
    if (Math.abs(dE) < 1e-7) break;
  }
  return E;
}

function planetSemiMajor(p) {
  return state.scaleMode === "real" ? p.realAU * AU_PX : p.orbit;
}

// returns {x,y,z, screenX, screenY, depth, trueAnom}
function planetPosition(p, simDays) {
  const a = planetSemiMajor(p);
  const e = p.e;
  const T = p.period;
  const M = ((simDays % T) / T) * Math.PI * 2;
  const E = solveKepler(M, e);
  // orbit-plane (focus at origin, periapsis on +x)
  const xo = a * (Math.cos(E) - e);
  const yo = a * Math.sqrt(1 - e*e) * Math.sin(E);
  // rotate by longitude of periapsis (in orbit plane around z=0)
  const w = p.peri * Math.PI / 180;
  const xr = xo*Math.cos(w) - yo*Math.sin(w);
  const yr = xo*Math.sin(w) + yo*Math.cos(w);
  // inclination tilt around the X axis of orbit (simplified: ascending node at +x)
  const inc = p.inc * Math.PI / 180;
  const x3 = xr;
  const y3 = yr * Math.cos(inc);
  const z3 = yr * Math.sin(inc);
  return project3D(x3, y3, z3);
}

function project3D(x, y, z) {
  // view tilt rotates around X axis
  const a = state.tilt;
  const yv = y*Math.cos(a) + z*Math.sin(a);
  const zv = -y*Math.sin(a) + z*Math.cos(a);
  const screenX = state.cx + (x + state.camX) * state.zoom;
  const screenY = state.cy + (yv + state.camY) * state.zoom;
  return { x, y, z, screenX, screenY, depth: zv };
}

function screenToWorld(sx, sy) {
  // approximate inverse (ignores tilt for camera dragging)
  return {
    x: (sx - state.cx) / state.zoom - state.camX,
    y: (sy - state.cy) / state.zoom - state.camY
  };
}

// ---------- Drawing ----------
function drawStars() {
  for (const s of stars) {
    s.a += s.tw * (Math.random() < 0.5 ? -1 : 1);
    if (s.a < 0.15) s.a = 0.15; if (s.a > 0.95) s.a = 0.95;
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
}

function drawSun() {
  const p = project3D(0,0,0);
  const r = SUN.radius * state.zoom;
  const grad = ctx.createRadialGradient(p.screenX, p.screenY, r*0.4, p.screenX, p.screenY, r*5);
  grad.addColorStop(0, "rgba(253,184,19,0.85)");
  grad.addColorStop(0.3, "rgba(253,140,30,0.25)");
  grad.addColorStop(1, "rgba(253,140,30,0)");
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(p.screenX, p.screenY, r*5, 0, Math.PI*2); ctx.fill();
  const body = ctx.createRadialGradient(p.screenX - r*0.3, p.screenY - r*0.3, r*0.1, p.screenX, p.screenY, r);
  body.addColorStop(0, "#FFF1B0"); body.addColorStop(0.5, "#FDB813"); body.addColorStop(1, "#E07A14");
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(p.screenX, p.screenY, r, 0, Math.PI*2); ctx.fill();
}

function drawOrbit(planet) {
  if (!state.showOrbits) return;
  const a = planetSemiMajor(planet);
  const e = planet.e;
  const w = planet.peri * Math.PI / 180;
  const inc = planet.inc * Math.PI / 180;
  ctx.strokeStyle = "rgba(180,200,230,0.18)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  const N = 96;
  for (let i = 0; i <= N; i++) {
    const E = (i / N) * Math.PI * 2;
    const xo = a * (Math.cos(E) - e);
    const yo = a * Math.sqrt(1-e*e) * Math.sin(E);
    const xr = xo*Math.cos(w) - yo*Math.sin(w);
    const yr = xo*Math.sin(w) + yo*Math.cos(w);
    const x3 = xr, y3 = yr*Math.cos(inc), z3 = yr*Math.sin(inc);
    const sp = project3D(x3, y3, z3);
    if (i===0) ctx.moveTo(sp.screenX, sp.screenY);
    else ctx.lineTo(sp.screenX, sp.screenY);
  }
  ctx.stroke();
}

function shade(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  let r=(n>>16)+amt, g=((n>>8)&0xff)+amt, b=(n&0xff)+amt;
  r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
  return "#" + ((r<<16)|(g<<8)|b).toString(16).padStart(6,"0");
}

function drawPlanetBody(p, planet, simDays) {
  const r = Math.max(2, planet.radius * state.zoom);
  const x = p.screenX, y = p.screenY;

  // base sphere
  const lightAng = -Math.PI/4;
  const dx = Math.cos(lightAng) * r * 0.35;
  const dy = Math.sin(lightAng) * r * 0.35;
  const grad = ctx.createRadialGradient(x - dx, y - dy, r*0.1, x, y, r);
  grad.addColorStop(0, shade(planet.color, 35));
  grad.addColorStop(0.55, planet.color);
  grad.addColorStop(1, shade(planet.color, -45));
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();

  // bands (gas giants) — drawn as clipped horizontal stripes that shift with rotation
  if (planet.bands && r > 6) {
    ctx.save();
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.clip();
    const rot = (simDays / planet.rotPeriod) * 0.05;  // very subtle visual rotation
    const nb = planet.bands.length;
    for (let i = 0; i < nb; i++) {
      const t0 = -1 + (i / nb) * 2 + (Math.sin(rot + i)*0.03);
      const t1 = -1 + ((i+1) / nb) * 2 + (Math.sin(rot + i + 0.3)*0.03);
      ctx.fillStyle = planet.bands[i] + "B0"; // alpha
      ctx.fillRect(x - r, y + t0*r, r*2, (t1-t0)*r + 0.6);
    }
    // red spot for Jupiter
    if (planet.en === "Jupiter") {
      ctx.fillStyle = "rgba(180,60,40,0.85)";
      const sx = x + Math.cos(rot*3)*r*0.35;
      const sy = y + r*0.2;
      ctx.beginPath();
      ctx.ellipse(sx, sy, r*0.22, r*0.12, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Saturn ring
  if (planet.hasRing) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(-0.4);
    ctx.scale(1, 0.32 + Math.sin(state.tilt) * 0.15);
    ctx.strokeStyle = "rgba(220,200,160,0.55)";
    ctx.lineWidth = Math.max(2, r * 0.18);
    ctx.beginPath(); ctx.arc(0, 0, r * 1.9, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = "rgba(220,200,160,0.25)";
    ctx.lineWidth = Math.max(1, r * 0.08);
    ctx.beginPath(); ctx.arc(0, 0, r * 2.3, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

function drawTrail(idx) {
  if (!state.showTrails) return;
  const trail = state.trails[idx];
  if (trail.length < 2) return;
  const c = PLANETS[idx].color;
  for (let i = 1; i < trail.length; i++) {
    const a = i / trail.length * 0.6;
    ctx.strokeStyle = c + Math.round(a*255).toString(16).padStart(2,"0");
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(trail[i-1].x, trail[i-1].y);
    ctx.lineTo(trail[i].x, trail[i].y);
    ctx.stroke();
  }
}

function drawMoon(planetScreen, moon, simDays) {
  const ang = (simDays / moon.period) * Math.PI * 2;
  const mr = moon.orbit * state.zoom;
  if (state.showOrbits) {
    ctx.strokeStyle = "rgba(200,210,230,0.18)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(planetScreen.x, planetScreen.y, mr, 0, Math.PI*2); ctx.stroke();
  }
  const mp = { x: planetScreen.x + Math.cos(ang)*mr, y: planetScreen.y + Math.sin(ang)*mr };
  const r = moon.radius * state.zoom;
  ctx.fillStyle = moon.color;
  ctx.beginPath(); ctx.arc(mp.x, mp.y, Math.max(1, r), 0, Math.PI*2); ctx.fill();
  if (state.showLabels && r > 1.2) {
    ctx.fillStyle = "rgba(220,230,240,0.6)"; ctx.font = "10px sans-serif";
    ctx.fillText(moon.name, mp.x + r + 3, mp.y + 3);
  }
}

function drawLabel(p, planet, r) {
  if (!state.showLabels) return;
  ctx.fillStyle = "rgba(230,237,243,0.9)";
  ctx.font = "12px -apple-system, 'PingFang SC', sans-serif";
  ctx.fillText(planet.name, p.x + r + 6, p.y + 4);
}

// ---------- Asteroid / Kuiper belts ----------
function genBelt(count, aMin, aMax, color, sizeMax) {
  const arr = [];
  for (let i = 0; i < count; i++) {
    const a = aMin + Math.random()*(aMax - aMin);  // semi-major axis in AU
    arr.push({
      aAU: a,
      e: Math.random()*0.12,
      peri: Math.random()*Math.PI*2,
      inc: (Math.random()-0.5) * 0.3,   // radians
      phase: Math.random()*Math.PI*2,
      size: 0.4 + Math.random()*sizeMax,
      color
    });
  }
  return arr;
}
const asteroids = genBelt(420, 2.2, 3.3, "#7d6f5e", 0.9);
const kuipers   = genBelt(280, 30, 50, "#7a8aa0", 1.0);

function drawBelt(belt, simDays) {
  if (!state.showBelts) return;
  const aFactor = state.scaleMode === "real" ? AU_PX : (145 / 1.0); // schematic: Earth at 145px = 1 AU
  for (const b of belt) {
    const a = b.aAU * aFactor;
    const T = Math.pow(b.aAU, 1.5) * 365.25; // Kepler's 3rd law (days)
    const M = ((simDays + b.phase * T / (Math.PI*2)) % T) / T * Math.PI*2;
    const E = solveKepler(M, b.e);
    const xo = a*(Math.cos(E)-b.e);
    const yo = a*Math.sqrt(1-b.e*b.e)*Math.sin(E);
    const xr = xo*Math.cos(b.peri) - yo*Math.sin(b.peri);
    const yr = xo*Math.sin(b.peri) + yo*Math.cos(b.peri);
    const x3 = xr, y3 = yr*Math.cos(b.inc), z3 = yr*Math.sin(b.inc) + b.aAU*b.inc*0.2;
    const p = project3D(x3, y3, z3);
    ctx.fillStyle = b.color;
    ctx.globalAlpha = 0.55;
    ctx.beginPath(); ctx.arc(p.screenX, p.screenY, b.size, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---------- Sonification ----------
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playNote(freq) {
  if (!state.soundOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = "sine"; osc.frequency.value = freq;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(0.18, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + 1.2);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0 + 1.3);
}
function checkRevolutions() {
  for (let i = 0; i < PLANETS.length; i++) {
    const r = Math.floor(state.simDays / PLANETS[i].period);
    if (r !== state.lastRev[i]) {
      if (state.lastRev[i] !== 0 && Math.abs(r - state.lastRev[i]) <= 4) playNote(NOTES[i]);
      state.lastRev[i] = r;
    }
  }
}

// ---------- Main loop ----------
let lastT = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  if (state.playing) {
    state.simDays += dt * SPEED_MODES[state.speedMode].value;
    checkRevolutions();
  }

  // clear
  ctx.fillStyle = "#05070d";
  ctx.fillRect(0, 0, W, H);
  drawStars();

  state.cx = W / 2; state.cy = H / 2;

  // Belts (behind planets but in front of stars)
  drawBelt(asteroids, state.simDays);

  // Orbits
  for (let i = 0; i < PLANETS.length; i++) {
    if (state.soloIndex !== -1 && state.soloIndex !== i) continue;
    if (!state.visible.has(i)) continue;
    drawOrbit(PLANETS[i]);
  }
  drawSun();

  // Planets — depth sort so far-side draws first
  state.positions.length = 0;
  const order = [];
  for (let i = 0; i < PLANETS.length; i++) {
    if (state.soloIndex !== -1 && state.soloIndex !== i) continue;
    if (!state.visible.has(i)) continue;
    const pos = planetPosition(PLANETS[i], state.simDays);
    state.positions[i] = { x: pos.screenX, y: pos.screenY, r: Math.max(2, PLANETS[i].radius * state.zoom) };
    order.push({ i, pos });
    // record trail
    if (state.showTrails) {
      const tr = state.trails[i];
      tr.push({ x: pos.screenX, y: pos.screenY });
      if (tr.length > 80) tr.shift();
    }
  }
  order.sort((a,b) => a.pos.depth - b.pos.depth);

  for (const item of order) {
    drawTrail(item.i);
    drawPlanetBody(item.pos, PLANETS[item.i], state.simDays);
    drawLabel({x: item.pos.screenX, y: item.pos.screenY}, PLANETS[item.i], PLANETS[item.i].radius * state.zoom);
    if (state.soloIndex === item.i || state.zoom > 2.2) {
      for (const m of PLANETS[item.i].moons) {
        drawMoon({x: item.pos.screenX, y: item.pos.screenY}, m, state.simDays);
      }
    }
    if (state.focusIndex === item.i) {
      ctx.strokeStyle = "rgba(120,180,255,0.7)"; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(item.pos.screenX, item.pos.screenY, PLANETS[item.i].radius * state.zoom + 8, 0, Math.PI*2);
      ctx.stroke();
    }
  }

  // Kuiper belt — drawn last (outermost)
  drawBelt(kuipers, state.simDays);

  // UI updates
  updateTimelineUI();
  document.getElementById("speed-info").textContent = SPEED_MODES[state.speedMode].label;

  requestAnimationFrame(frame);
}

function updateTimelineUI() {
  const d = new Date(J2000.getTime() + state.simDays * 86400000);
  const yyyy = d.getUTCFullYear();
  const mm = String(d.getUTCMonth()+1).padStart(2,"0");
  const dd = String(d.getUTCDate()).padStart(2,"0");
  document.getElementById("sim-date").textContent = `${yyyy}-${mm}-${dd}`;
  const sc = document.getElementById("scrubber");
  if (document.activeElement !== sc) sc.value = Math.round(state.simDays);
  const min = +sc.min, max = +sc.max;
  const pct = ((+sc.value - min) / (max - min)) * 100;
  sc.style.setProperty("--p", pct + "%");
}

// ---------- Info panel ----------
function showInfo(i) {
  const info = document.getElementById("info");
  if (i < 0) { info.classList.add("hidden"); return; }
  const p = PLANETS[i];
  info.classList.remove("hidden");
  document.getElementById("info-swatch").style.background = p.color;
  document.getElementById("info-swatch").style.color = p.color;
  document.getElementById("info-name").textContent = `${p.name} · ${p.en}`;
  document.getElementById("info-desc").textContent = p.desc;
  const dl = document.getElementById("info-stats"); dl.innerHTML = "";
  for (const [k,v] of Object.entries(p.stats)) dl.innerHTML += `<dt>${k}</dt><dd>${v}</dd>`;
  drawPeriodChart(i);
  const mw = document.getElementById("info-moons-wrap");
  const mr = document.getElementById("info-moons");
  if (p.moons.length) {
    mw.style.display = "block";
    mr.innerHTML = p.moons.map(m => `<span class="moon-pill">${m.name}</span>`).join("");
  } else mw.style.display = "none";
}

function drawPeriodChart(highlightIdx) {
  const c = document.getElementById("period-chart");
  const dpr = window.devicePixelRatio || 1;
  const w = c.clientWidth || 258, h = 56;
  c.width = w*dpr; c.height = h*dpr;
  const cc = c.getContext("2d"); cc.setTransform(dpr,0,0,dpr,0,0);
  cc.clearRect(0,0,w,h);
  const earthP = 365.25;
  const ratios = PLANETS.map(p => p.period / earthP);
  const max = Math.max(...ratios);
  const min = Math.min(...ratios);
  const logMax = Math.log10(max), logMin = Math.log10(min);
  const barW = (w - 16) / PLANETS.length - 4;
  for (let i = 0; i < PLANETS.length; i++) {
    const lr = (Math.log10(ratios[i]) - logMin) / (logMax - logMin);
    const bh = 6 + lr * (h - 22);
    const x = 8 + i * (barW + 4);
    const y = h - bh - 12;
    cc.fillStyle = i === highlightIdx ? PLANETS[i].color : shade(PLANETS[i].color, -30) + "AA";
    cc.fillRect(x, y, barW, bh);
    cc.fillStyle = i === highlightIdx ? "#fff" : "rgba(200,210,220,0.6)";
    cc.font = "9px sans-serif"; cc.textAlign = "center";
    cc.fillText(PLANETS[i].name[0], x + barW/2, h - 2);
  }
}

// ---------- Planet list ----------
function initPlanetList() {
  const root = document.getElementById("planet-rows"); root.innerHTML = "";
  PLANETS.forEach((p, i) => {
    const row = document.createElement("div");
    row.className = "planet-row"; row.dataset.index = i;
    row.innerHTML = `
      <span class="swatch" style="background:${p.color};color:${p.color};"></span>
      <span class="name">${p.name}</span>
      <input type="checkbox" checked />`;
    const cb = row.querySelector("input");
    cb.addEventListener("change", e => {
      e.stopPropagation();
      if (cb.checked) state.visible.add(i); else state.visible.delete(i);
    });
    row.addEventListener("click", e => {
      if (e.target === cb) return;
      state.soloIndex = (state.soloIndex === i) ? -1 : i;
      state.focusIndex = i;
      if (state.soloIndex === i) zoomToPlanet(i);
      updatePlanetListUI(); showInfo(i);
    });
    root.appendChild(row);
  });
  updatePlanetListUI();
}
function zoomToPlanet(i) {
  const a = planetSemiMajor(PLANETS[i]);
  const target = (a + 90) * 2;
  state.zoom = Math.min(W, H) / target;
  state.zoom = Math.max(0.3, Math.min(state.zoom, 6));
  state.camX = 0; state.camY = 0;
}
function updatePlanetListUI() {
  document.querySelectorAll(".planet-row").forEach((row, i) => {
    row.classList.toggle("focused", state.soloIndex === i || state.focusIndex === i);
  });
}

// ---------- Controls ----------
document.querySelectorAll("#speed-seg button").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll("#speed-seg button").forEach(x => x.classList.remove("active"));
    b.classList.add("active"); state.speedMode = b.dataset.speed;
  });
});
document.querySelectorAll("#scale-seg button").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll("#scale-seg button").forEach(x => x.classList.remove("active"));
    b.classList.add("active"); state.scaleMode = b.dataset.scale;
    state.trails.forEach(t => t.length = 0);
    // adjust zoom so the outer planets fit when switching to real
    if (state.scaleMode === "real") {
      const target = (PLANETS[7].realAU * AU_PX + 80) * 2;
      state.zoom = Math.min(W, H) / target;
    } else state.zoom = 1;
    state.camX = 0; state.camY = 0;
  });
});
document.getElementById("play-btn").addEventListener("click", e => {
  state.playing = !state.playing;
  e.target.textContent = state.playing ? "⏸" : "▶";
});
document.getElementById("reset-btn").addEventListener("click", () => {
  state.camX = 0; state.camY = 0;
  state.zoom = state.scaleMode === "real" ? Math.min(W,H) / ((PLANETS[7].realAU * AU_PX + 80) * 2) : 1;
});
function toggleBtn(id, key, label) {
  const el = document.getElementById(id);
  el.addEventListener("click", () => {
    state[key] = !state[key];
    el.classList.toggle("on", state[key]);
  });
}
toggleBtn("orbits-btn", "showOrbits");
toggleBtn("labels-btn", "showLabels");
toggleBtn("trails-btn", "showTrails");
toggleBtn("belts-btn", "showBelts");
document.getElementById("tilt-btn").addEventListener("click", e => {
  const isOn = e.target.classList.toggle("on");
  state.tilt = isOn ? 25 * Math.PI/180 : 0;
  e.target.textContent = isOn ? "倾斜 25°" : "俯视";
});
document.getElementById("sound-btn").addEventListener("click", e => {
  state.soundOn = !state.soundOn;
  if (state.soundOn) initAudio();
  e.target.textContent = state.soundOn ? "🔊" : "🔇";
  e.target.classList.toggle("on", state.soundOn);
});
document.getElementById("solo-btn").addEventListener("click", () => {
  state.soloIndex = -1; state.focusIndex = -1;
  showInfo(-1); updatePlanetListUI();
});
document.getElementById("scrubber").addEventListener("input", e => {
  state.simDays = +e.target.value;
  state.trails.forEach(t => t.length = 0);
  // reset rev counters silently
  for (let i = 0; i < PLANETS.length; i++) state.lastRev[i] = Math.floor(state.simDays/PLANETS[i].period);
});

// ---------- Pointer / touch interactions ----------
function hitTest(cx, cy) {
  for (let i = 0; i < state.positions.length; i++) {
    const pos = state.positions[i]; if (!pos) continue;
    const d = Math.hypot(cx - pos.x, cy - pos.y);
    if (d < Math.max(10, pos.r + 5)) return i;
  }
  return -1;
}

canvas.addEventListener("wheel", e => {
  e.preventDefault();
  const f = e.deltaY > 0 ? 0.88 : 1.135;
  const before = screenToWorld(e.clientX, e.clientY);
  state.zoom = Math.max(0.15, Math.min(state.zoom * f, 14));
  const after = screenToWorld(e.clientX, e.clientY);
  state.camX += (after.x - before.x);
  state.camY += (after.y - before.y);
}, { passive: false });

canvas.addEventListener("mousedown", e => {
  state.dragging = true; state.lastX = e.clientX; state.lastY = e.clientY;
});
window.addEventListener("mouseup", () => state.dragging = false);
window.addEventListener("mousemove", e => {
  const hovered = hitTest(e.clientX, e.clientY);
  const tip = document.getElementById("tip");
  if (hovered >= 0 && !state.dragging) {
    tip.textContent = PLANETS[hovered].name;
    tip.style.left = (e.clientX + 12) + "px";
    tip.style.top  = (e.clientY + 12) + "px";
    tip.style.opacity = 1; canvas.style.cursor = "pointer";
  } else {
    tip.style.opacity = 0;
    canvas.style.cursor = state.dragging ? "grabbing" : "grab";
  }
  if (state.dragging) {
    state.camX += (e.clientX - state.lastX) / state.zoom;
    state.camY += (e.clientY - state.lastY) / state.zoom;
    state.lastX = e.clientX; state.lastY = e.clientY;
  }
});

let clickStart = null;
canvas.addEventListener("mousedown", e => clickStart = {x: e.clientX, y: e.clientY});
canvas.addEventListener("click", e => {
  if (clickStart && Math.hypot(e.clientX - clickStart.x, e.clientY - clickStart.y) > 5) return;
  const i = hitTest(e.clientX, e.clientY);
  if (i >= 0) {
    state.soloIndex = i; state.focusIndex = i;
    zoomToPlanet(i); showInfo(i); updatePlanetListUI();
  }
});

// Touch: pan + pinch
canvas.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    state.dragging = true;
    state.lastX = e.touches[0].clientX;
    state.lastY = e.touches[0].clientY;
    clickStart = {x: state.lastX, y: state.lastY};
  } else if (e.touches.length === 2) {
    state.dragging = false;
    state.pinchD = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });
canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  if (e.touches.length === 1 && state.dragging) {
    const x = e.touches[0].clientX, y = e.touches[0].clientY;
    state.camX += (x - state.lastX) / state.zoom;
    state.camY += (y - state.lastY) / state.zoom;
    state.lastX = x; state.lastY = y;
  } else if (e.touches.length === 2) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY);
    if (state.pinchD > 0) {
      const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const f = d / state.pinchD;
      const before = screenToWorld(mx, my);
      state.zoom = Math.max(0.15, Math.min(state.zoom * f, 14));
      const after = screenToWorld(mx, my);
      state.camX += (after.x - before.x);
      state.camY += (after.y - before.y);
    }
    state.pinchD = d;
  }
}, { passive: false });
canvas.addEventListener("touchend", e => {
  if (e.touches.length === 0 && clickStart) {
    const t = e.changedTouches[0];
    if (Math.hypot(t.clientX - clickStart.x, t.clientY - clickStart.y) < 8) {
      const i = hitTest(t.clientX, t.clientY);
      if (i >= 0) { state.soloIndex = i; state.focusIndex = i; zoomToPlanet(i); showInfo(i); updatePlanetListUI(); }
    }
  }
  state.dragging = false; state.pinchD = 0;
});

window.addEventListener("keydown", e => {
  if (e.code === "Space") { e.preventDefault(); document.getElementById("play-btn").click(); }
  if (e.key === "Escape")  { document.getElementById("solo-btn").click(); }
});

// ---------- Boot ----------
resize();
initPlanetList();
showInfo(-1);
requestAnimationFrame(frame);
</script>
</body>
</html>
